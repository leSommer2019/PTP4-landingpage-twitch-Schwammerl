<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');

    body { background: #222; margin: 0; width: 100vw; height: 100vh; overflow: hidden; }
    #media { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
    video, audio, iframe { max-width: 80vw; max-height: 80vh; }
    .reward-text {
      font-family: 'Poppins', 'Segoe UI', 'Arial', sans-serif;
      font-size: 2.2em;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 0.3em 0.8em;
      border-radius: 18px;
      background: linear-gradient(90deg, #ffb347 0%, #ffcc33 40%, #fff6b7 100%);
      color: #222;
      box-shadow: 0 4px 32px rgba(0,0,0,0.18);
      display: inline-block;
      margin: 0.5em auto;
      text-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }
  </style>
</head>
<body>
  <div id="media"></div>

  <!-- Debug-Panel -->
  <div id="debugPanel" style="position: fixed; top: 10px; right: 10px; width: 400px; max-height: 400px; background: rgba(0,0,0,0.9); color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; border: 1px solid #0f0; border-radius: 5px; overflow-y: auto; z-index: 10000; display: none;">
    <div style="margin-bottom: 10px;">
      <button onclick="document.getElementById('debugPanel').style.display='none'" style="background: #f00; color: white; border: none; padding: 5px 10px; cursor: pointer;">✕ Schließen</button>
      <button onclick="clearDebugLogs()" style="background: #ff0; color: black; border: none; padding: 5px 10px; cursor: pointer; margin-left: 5px;">Clear</button>
      <button onclick="testTTSManual()" style="background: #0f0; color: black; border: none; padding: 5px 10px; cursor: pointer; margin-left: 5px;">🔊 Test TTS</button>
    </div>
    <pre id="debugLog" style="margin: 0; white-space: pre-wrap; word-wrap: break-word;"></pre>
  </div>

  <script>
    // Debug-System
    const debugLogs = [];
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;

    function addDebugLog(message) {
      debugLogs.push(message);
      if (debugLogs.length > 100) debugLogs.shift();
      updateDebugPanel();
    }

    function updateDebugPanel() {
      const panel = document.getElementById('debugLog');
      if (panel) {
        panel.textContent = debugLogs.join('\n');
        panel.parentElement.scrollTop = panel.parentElement.scrollHeight;
      }
    }

    function clearDebugLogs() {
      debugLogs.length = 0;
      updateDebugPanel();
    }

    // Intercept console logs
    console.log = function(...args) {
      const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
      addDebugLog('[LOG] ' + msg);
      originalLog.apply(console, args);
    };

    console.error = function(...args) {
      const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
      addDebugLog('[ERR] ' + msg);
      originalError.apply(console, args);
    };

    console.warn = function(...args) {
      const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
      addDebugLog('[WARN] ' + msg);
      originalWarn.apply(console, args);
    };

    // Zeige Debug-Panel auf Druck von 'd'
    document.addEventListener('keydown', (e) => {
      if (e.key === 'd' || e.key === 'D') {
        const panel = document.getElementById('debugPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      }
    });

    function testTTSManual() {
      console.log('[DEBUG] Starte manuellen TTS-Test');
      if (!window.speechSynthesis) {
        console.error('❌ speechSynthesis nicht verfügbar!');
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new window.SpeechSynthesisUtterance('Test Text eins zwei drei');
      utter.lang = 'de-DE';
      utter.volume = 1;
      utter.rate = 1;
      utter.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const germanVoice = voices.find(v => v.lang.startsWith('de'));
      if (germanVoice) {
        utter.voice = germanVoice;
        console.log('✅ Deutsche Stimme: ' + germanVoice.name);
      }

      utter.onstart = () => console.log('▶️ TTS gestartet');
      utter.onend = () => console.log('✅ TTS beendet');
      utter.onerror = (e) => console.error('❌ TTS Fehler: ' + e.error);

      window.speechSynthesis.speak(utter);
    }
  </script>

  <script>

    async function fetchRewards() {
      console.log('[Overlay] Lade Rewards aus DB ...');
      const response = await fetch('/api/rewards');
      const data = await response.json();
      console.log('[Overlay] Rewards geladen:', data);
      return data;
    }
    async function fetchRedeemedRewards() {
      console.log('[Overlay] Lade eingelöste Rewards ...');
      const response = await fetch('/api/redeemed_rewards');
      const data = await response.json();
      console.log('[Overlay] Eingelöste Rewards:', data);
      return data;
    }
    let pollTimeoutId = null;
    let isPlaying = false;
    // IDs der zuletzt abgespielten Rewards merken (max 20)
    function getPlayedRewardIds() {
      try {
        return JSON.parse(localStorage.getItem('playedRewardIds') || '[]');
      } catch { return []; }
    }
    function addPlayedRewardId(id) {
      let arr = getPlayedRewardIds();
      arr.push(id);
      if (arr.length > 20) arr = arr.slice(arr.length - 20);
      localStorage.setItem('playedRewardIds', JSON.stringify(arr));
    }
    async function pollRedeemedRewards() {
      if (isPlaying) return; // Blockiere doppeltes Polling während Wiedergabe
      const now = Date.now();
      const redeemed = await fetchRedeemedRewards();
      const playedIds = getPlayedRewardIds();
      // Finde ersten Reward, der noch nicht gespielt wurde
      const next = redeemed.find(r => !playedIds.includes(r.id));
      console.log(`[Overlay] Polling: ${redeemed.length} Rewards gefunden, Zeit seit letztem: ${now - lastRedeemTime}ms`);
      if (next && (now - lastRedeemTime >= MIN_REDEEM_INTERVAL)) {
        console.log('[Overlay] Spiele nächsten Reward ab ...');
        isPlaying = true;
        await playAndDeleteReward(next);
        lastRedeemTime = Date.now();
        addPlayedRewardId(next.id);
        // Das weitere Polling wird erst nach erfolgreichem Löschen im clearAndDelete() wieder gestartet!
      } else {
        document.getElementById('media').innerHTML = '';
        pollTimeoutId = setTimeout(pollRedeemedRewards, 5000);
      }
    }
    async function playAndDeleteReward(redeemed) {
      console.log('[Overlay] Starte playAndDeleteReward für:', redeemed);
      const rewards = await fetchRewards();
      const reward = rewards.find(r => String(r.id) === String(redeemed.reward_id));
      console.log('[Overlay] Gefundener Reward:', reward);
      if (!reward) {
        console.error('[Overlay] ❌ Reward NICHT gefunden! reward_id:', redeemed.reward_id);
        console.log('[Overlay] Verfügbare Reward-IDs:', rewards.map(r => r.id));
        return;
      }
      console.log('[Overlay] reward.istts:', reward?.istts, 'typeof:', typeof reward?.istts);
      const mediaDiv = document.getElementById('media');
      mediaDiv.innerHTML = '';
      let duration = reward.duration ? parseInt(reward.duration, 10) : 10; // Standard 10 Sekunden
      let timeoutId;
      console.log(`[Overlay] Zeige Reward: ${reward.id}, Dauer: ${duration}s`);
      const mediaUrl = reward.mediaurl || '';
      const imageUrl = reward.imageurl || '';
      const textContent = reward.text || reward.description || '';
      const lower = (mediaUrl || '').toLowerCase();
      const isYouTube = /youtube\.com|youtu\.be/.test(lower);
      const isAudio = /\.(mp3|wav|ogg|m4a)(\?|$)/.test(lower);
      const isImage = /\.(png|jpe?g|gif|webp)(\?|$)/.test(lower) || imageUrl;
      function getRewardTextHtml(textContent) {
        if (textContent && String(textContent).trim().length > 0) {
          return `<div class=\"reward-text\">${textContent}</div>`;
        }
        return '';
      }
      function afterPlayback() {
        // Nach der Wiedergabe: Lösche Reward aus DB
        fetch(`/api/redeemed_rewards?id=${redeemed.id}`, { method: 'DELETE' })
          .then(async response => {
            const text = await response.text();
            if (response.ok) {
              console.log('[Overlay] Reward nach Wiedergabe gelöscht:', redeemed.id, '| Status:', response.status, '| Antwort:', text);
            } else {
              console.error('[Overlay] Fehler beim Löschen nach Wiedergabe:', response.status, response.statusText, '| Antwort:', text);
            }
          })
          .catch(e => {
            console.error('[Overlay] Fehler beim Löschen nach Wiedergabe (Netzwerk/JS):', e);
          });
        mediaDiv.innerHTML = '';
        isPlaying = false;
        pollTimeoutId = setTimeout(pollRedeemedRewards, 5000);
      }
      if (reward.istts === true || reward.istts === 'true' || reward.istts === 1) {
        let text;
        console.log('[Overlay] TTS Reward erkannt. redeemed.ttstext:', redeemed.ttstext);
        if (reward.id === 'raid_leader' || reward.id === '11') {
          const username = redeemed.user || redeemed.twitch_user_name || '';
          const target = redeemed.ttstext || redeemed.tts_text || redeemed.ttsText || redeemed.description || '';
          text = `RAID-Anführer ${username} zu ${target}`;
          console.log('[Overlay] RAID-Anführer erkannt, Text:', text);
        } else {
          text = redeemed.ttstext || redeemed.tts_text || redeemed.ttsText || redeemed.description || reward.description || 'Text to Speech';
          console.log('[Overlay] Standard TTS Text:', text);
        }
        mediaDiv.innerHTML = getRewardTextHtml(text);
        if ('speechSynthesis' in window && text && String(text).trim().length > 0) {
          try {
            window.speechSynthesis.cancel();
            const utter = new window.SpeechSynthesisUtterance(text);
            utter.lang = 'de-DE';
            utter.volume = 1;
            utter.rate = 1;
            utter.pitch = 1;

            // Versuche deutsche Stimme zu finden
            if (window.speechSynthesis.getVoices) {
              const voices = window.speechSynthesis.getVoices();
              const germanVoice = voices.find(v => v.lang.startsWith('de'));
              if (germanVoice) {
                utter.voice = germanVoice;
                console.log('[Overlay] Deutsche Stimme gefunden:', germanVoice.name);
              }
            }

            // Sicherheits-Fallback: Falls TTS blockiert wird, nach X Sekunden weitermachen
            const safetyTimeout = setTimeout(() => {
              console.warn('[Overlay] TTS Sicherheits-Fallback ausgelöst (Browser blockiert evtl.)');
              afterPlayback();
            }, (duration * 1000) + 500);

            utter.onend = () => {
              clearTimeout(safetyTimeout);
              console.log('[Overlay] TTS erfolgreich beendet');
              afterPlayback();
            };

            utter.onerror = (e) => {
              clearTimeout(safetyTimeout);
              console.error('[Overlay] TTS Fehler:', e);
              afterPlayback();
            };

            console.log('[Overlay] Starte TTS: ' + text);
            window.speechSynthesis.speak(utter);
          } catch (e) {
            console.error('[Overlay] TTS Exception:', e);
            setTimeout(afterPlayback, duration * 1000);
          }
        } else {
          console.warn('[Overlay] TTS nicht verfügbar oder Text leer.');
          mediaDiv.innerHTML += '<div style=\"color:red;font-size:1em;\">TTS nicht verfügbar oder Text leer.</div>';
          setTimeout(afterPlayback, duration * 1000);
        }
        console.log('[Overlay] TTS Reward:', text);
      } else if (mediaUrl) {
        if (isYouTube) {
          const ytIdMatch = mediaUrl.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
          const ytId = ytIdMatch ? ytIdMatch[1] : '';
          if (reward.showmedia === false) {
            let imgHtml = '';
            if (imageUrl) imgHtml = `<img src=\"${imageUrl}\" alt=\"Reward-Bild\" style=\"max-width:60vw;max-height:60vh;\" />`;
            mediaDiv.innerHTML = `<div style='display:flex;flex-direction:column;align-items:center;justify-content:center;'>
            <iframe width="1" height="1" style="opacity:0;position:absolute;left:-9999px;pointer-events:none;" src="https://www.youtube.com/embed/${ytId}?autoplay=1" allow="autoplay; encrypted-media"></iframe>              ${imgHtml}${getRewardTextHtml(textContent)}
            </div>`;
            console.log('[Overlay] YouTube-Video ausgeblendet, Ton läuft, zeige stattdessen Bild/Text:', imageUrl, textContent);
            setTimeout(afterPlayback, duration * 1000);
          } else {
            if (!window.YT) {
              let tag = document.createElement('script');
              tag.src = "https://www.youtube.com/iframe_api";
              document.body.appendChild(tag);
            }
            function onYouTubeIframeAPIReadyWrapper() {
              mediaDiv.innerHTML = `<div id=\"ytplayer\"></div>`;
              let player = new window.YT.Player('ytplayer', {
                height: '315',
                width: '560',
                videoId: ytId,
                playerVars: { 'autoplay': 1 },
                events: {
                  'onStateChange': function(event) {
                    if (event.data === window.YT.PlayerState.PLAYING) {
                      console.log('[Overlay] YouTube-Video PLAYING:', mediaUrl, '| getCurrentTime:', player.getCurrentTime());
                    }
                    if (event.data === window.YT.PlayerState.ENDED) {
                      console.log('[Overlay] YouTube-Video ENDED:', mediaUrl);
                      afterPlayback();
                    }
                  }
                }
              });
              setTimeout(() => {
                console.warn('[Overlay] YouTube-Timeout als Fallback ausgelöst!');
                afterPlayback();
              }, duration * 1000);
              console.log('[Overlay] YouTube-Video eingebettet (API):', mediaUrl);
            }
            if (window.YT && window.YT.Player) {
              onYouTubeIframeAPIReadyWrapper();
            } else {
              window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReadyWrapper;
            }
          }
        } else if (isAudio) {
          mediaDiv.innerHTML = `<audio id=\"rewardAudio\" src=\"${mediaUrl}\" controls autoplay></audio>`;
          console.log('[Overlay] Audio-Element erzeugt:', mediaUrl);
          const audio = document.getElementById('rewardAudio');
          if (audio) {
            audio.onloadedmetadata = () => {
              if (!reward.duration) duration = Math.ceil(audio.duration);
              setTimeout(afterPlayback, duration * 1000);
              console.log('[Overlay] Sound geladen, Dauer:', audio.duration);
            };
            audio.onended = afterPlayback;
          } else {
            setTimeout(afterPlayback, duration * 1000);
          }
        } else if (isImage) {
          const imgSrc = imageUrl || mediaUrl;
          mediaDiv.innerHTML = `<div style='display:flex;flex-direction:column;align-items:center;justify-content:center;'><img src=\"${imgSrc}\" alt=\"Reward-Bild\" style=\"max-width:60vw;max-height:60vh;\" />${getRewardTextHtml(textContent)}</div>`;
          console.log('[Overlay] Image+Text Reward:', imgSrc, textContent);
          setTimeout(afterPlayback, duration * 1000);
        } else {
          mediaDiv.innerHTML = getRewardTextHtml(textContent || reward.description || '');
          console.log('[Overlay] Unbekannter Media-Typ, zeige Text:', textContent || reward.description || '');
          setTimeout(afterPlayback, duration * 1000);
        }
      } else {
        mediaDiv.innerHTML = getRewardTextHtml(textContent || reward.description || '');
        console.log('[Overlay] Fallback Reward:', reward.description);
        setTimeout(afterPlayback, duration * 1000);
      }
    }
    let lastRedeemTime = 0;
    const MIN_REDEEM_INTERVAL = 5000;
    pollRedeemedRewards();
  </script>
</body>
</html>
