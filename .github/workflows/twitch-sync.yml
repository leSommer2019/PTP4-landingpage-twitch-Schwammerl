name: Daily Twitch Sync

on:
  schedule:
    # Alle 3 Stunden ausführen (UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Run Sync Script
        id: twitch_sync # ID hinzugefügt, um Outputs zu lesen
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_TWITCH_CLIENT_ID: ${{ secrets.VITE_TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_REFRESH_TOKEN: ${{ secrets.TWITCH_REFRESH_TOKEN }}
        run: npx tsx .github/scripts/sync-twitch-data.ts

      - name: Update Refresh Token Secret
        # Dieser Schritt läuft nur, wenn das Script einen neuen Token gefunden hat
        if: steps.twitch_sync.outputs.NEW_REFRESH_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_TOKEN: ${{ steps.twitch_sync.outputs.NEW_REFRESH_TOKEN }}
        run: |
          gh secret set TWITCH_REFRESH_TOKEN --body "$NEW_TOKEN"
          echo "Twitch Refresh Token wurde in den GitHub Secrets aktualisiert."

